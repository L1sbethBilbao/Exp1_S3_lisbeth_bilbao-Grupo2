name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: empresa-transportista-efs

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Configure SSH key file
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keygen -y -f ~/.ssh/ec2_deploy_key > /dev/null
          echo "Clave PEM valida (formato OK)"

      - name: Test SSH connection to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          USER_SERVER: ${{ secrets.USER_SERVER }}
        run: |
          EC2_HOST="$(echo "$EC2_HOST" | tr -d '[:space:]')"
          USER_SERVER="$(echo "$USER_SERVER" | tr -d '[:space:]')"
          echo "Conectando como: ${USER_SERVER}@${EC2_HOST}"
          ssh -i ~/.ssh/ec2_deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            "${USER_SERVER}@${EC2_HOST}" "echo SSH_OK && whoami && hostname"

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          USER_SERVER: ${{ secrets.USER_SERVER }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          EC2_HOST="$(echo "$EC2_HOST" | tr -d '[:space:]')"
          USER_SERVER="$(echo "$USER_SERVER" | tr -d '[:space:]')"
          AWS_S3_BUCKET="$(echo "$AWS_S3_BUCKET" | tr -d '[:space:]')"
          SSH_BASE=(ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          TARGET="${USER_SERVER}@${EC2_HOST}"
          "${SSH_BASE[@]}" "$TARGET" "echo '${DOCKERHUB_TOKEN}' | docker login -u '${DOCKERHUB_USERNAME}' --password-stdin"
          "${SSH_BASE[@]}" "$TARGET" "docker pull '${DOCKERHUB_USERNAME}/${{ env.IMAGE_NAME }}:latest'"
          "${SSH_BASE[@]}" "$TARGET" "docker stop ${{ env.IMAGE_NAME }} 2>/dev/null || true; docker rm ${{ env.IMAGE_NAME }} 2>/dev/null || true"
          "${SSH_BASE[@]}" "$TARGET" "docker run -d --name ${{ env.IMAGE_NAME }} --restart unless-stopped -p 8080:8080 \
            -v /mnt/efs:/app/efs \
            -e AWS_ACCESS_KEY_ID='${AWS_ACCESS_KEY_ID}' \
            -e AWS_SECRET_ACCESS_KEY='${AWS_SECRET_ACCESS_KEY}' \
            -e AWS_SESSION_TOKEN='${AWS_SESSION_TOKEN}' \
            -e AWS_S3_BUCKET='${AWS_S3_BUCKET}' \
            -e AWS_REGION='us-east-1' \
            '${DOCKERHUB_USERNAME}/${{ env.IMAGE_NAME }}:latest'"
          "${SSH_BASE[@]}" "$TARGET" "docker ps"
